name: virtinsaz_dev

services:
  mysql:
    image: mysql:8.4
    container_name: virtinsaz-dev-mysql
    restart: unless-stopped
    env_file:
      - .env
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
    volumes:
      - mysql_dev_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -u${MYSQL_USER} -p${MYSQL_PASSWORD} --silent"]
      interval: 10s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7-alpine
    container_name: virtinsaz-dev-redis
    restart: unless-stopped
    volumes:
      - redis_dev_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 20

  django:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: virtinsaz-dev-django
    restart: unless-stopped
    entrypoint: []
    env_file:
      - .env
    environment:
      DEBUG: "True"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: >
      sh -c "until python manage.py migrate --noinput; do
      echo 'Waiting for database...';
      sleep 2;
      done;
      python manage.py runserver 0.0.0.0:8000"
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app

  celery:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: virtinsaz-dev-celery
    restart: unless-stopped
    entrypoint: []
    env_file:
      - .env
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: >
      sh -c "until python manage.py migrate --noinput; do
      echo 'Waiting for database...';
      sleep 2;
      done;
      celery -A core worker --loglevel=info"
    volumes:
      - ./backend:/app

  frontend:
    image: node:22-alpine
    container_name: virtinsaz-dev-frontend
    restart: unless-stopped
    working_dir: /app
    depends_on:
      - django
    environment:
      INTERNAL_API_URL: http://django:8000/api
      NEXT_PUBLIC_API_URL: /api
      NODE_ENV: development
      CHOKIDAR_USEPOLLING: "true"
      WATCHPACK_POLLING: "true"
    command: >
      sh -c "npm install --no-audit --no-fund &&
      npm run dev -- --hostname 0.0.0.0 --port 3000"
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - frontend_dev_node_modules:/app/node_modules

volumes:
  mysql_dev_data:
  redis_dev_data:
  frontend_dev_node_modules:
