name: virtinsaz_local

services:
  mysql:
    image: mysql:8.4
    container_name: virtinsaz-mysql
    restart: unless-stopped
    env_file:
      - ${APP_ENV_FILE:-.env}
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -u$${MYSQL_USER} -p$${MYSQL_PASSWORD} --silent"]
      interval: 10s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7-alpine
    container_name: virtinsaz-redis
    restart: unless-stopped
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 20

  django:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: virtinsaz-django
    restart: unless-stopped
    env_file:
      - ${APP_ENV_FILE:-.env}
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    expose:
      - "8000"
    volumes:
      - static_data:/app/static
      - media_data:/app/media

  celery:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: virtinsaz-celery
    restart: unless-stopped
    env_file:
      - ${APP_ENV_FILE:-.env}
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: ["celery", "-A", "core", "worker", "--loglevel=info"]

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: /api
        INTERNAL_API_URL: http://django:8000/api
    container_name: virtinsaz-frontend
    restart: unless-stopped
    depends_on:
      - django
    environment:
      INTERNAL_API_URL: http://django:8000/api
      NEXT_PUBLIC_API_URL: /api
      NODE_ENV: production
    expose:
      - "3000"

  nginx:
    build:
      context: ./nginx
      dockerfile: Dockerfile
    container_name: virtinsaz-nginx
    restart: unless-stopped
    depends_on:
      - django
      - frontend
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - static_data:/var/www/static:ro
      - media_data:/var/www/media:ro
      - ./nginx/ssl/cloudflare.crt:/etc/nginx/ssl/cloudflare.crt:ro
      - ./nginx/ssl/cloudflare.key:/etc/nginx/ssl/cloudflare.key:ro

volumes:
  mysql_data:
  redis_data:
  static_data:
  media_data:
